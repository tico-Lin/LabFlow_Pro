[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "agent-runtime"
version = "0.1.0"
description = "LabFlow intelligent agent runtime"
requires-python = ">=3.12"
dependencies = [
    "grpcio>=1.68.0",
    "grpcio-tools>=1.68.0",
    "protobuf>=5.29.0",
    "anthropic>=0.40.0",
    "python-dotenv>=1.0.0",
    "structlog>=24.4.0",
]

[project.scripts]
agent-runtime = "agent_runtime.main:main"

[tool.setuptools.packages.find]
where = ["src"]
